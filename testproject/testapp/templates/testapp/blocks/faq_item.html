<details class="border-b border-zinc-200 py-6 group">
  <summary class="flex cursor-pointer items-center justify-between text-left list-none">
    <span class="pr-4 text-lg font-semibold text-zinc-900">{{ value.question }}</span>
    <span class="flex-shrink-0 text-2xl text-zinc-500 transition-transform duration-200 group-open:rotate-45">+</span>
  </summary>
  <p class="mt-4 leading-relaxed text-zinc-600">{{ value.answer }}</p>
</details>

{% load wagtailimages_tags %}

<div class="flex flex-col rounded-xl border border-zinc-200 bg-white p-8">
  <blockquote class="flex-1 text-lg italic leading-relaxed text-zinc-900">
    "{{ value.quote }}"
  </blockquote>
  <div class="mt-6 flex items-center gap-3">
    {% if value.avatar %}
      {% image value.avatar fill-80x80 class="h-10 w-10 rounded-full object-cover" %}
    {% else %}
      <div class="flex h-10 w-10 items-center justify-center rounded-full bg-orange-600 text-sm font-bold text-white">
        {{ value.author|first }}
      </div>
    {% endif %}
    <div>
      <div class="font-semibold text-zinc-900">{{ value.author }}</div>
      <div class="text-sm text-zinc-600">{{ value.role }}</div>
    </div>
  </div>
</div>

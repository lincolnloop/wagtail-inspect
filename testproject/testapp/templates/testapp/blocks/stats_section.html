{% load wagtailcore_tags %}

<section class="py-20 px-6 md:px-8 lg:px-12 {% if value.background == 'surface' %}bg-zinc-50{% elif value.background == 'secondary' %}bg-zinc-100{% else %}bg-white{% endif %}">
  <div class="mx-auto max-w-6xl">
    {% if value.badge or value.headline %}
      <div class="mb-16 text-center">
        {% if value.badge %}
          <span class="mb-4 inline-block rounded-full px-4 py-1.5 text-xs font-semibold uppercase tracking-wider bg-orange-50 text-orange-600">{{ value.badge }}</span>
        {% endif %}
        {% if value.headline %}<h2 class="text-3xl text-zinc-900 md:text-4xl">{{ value.headline }}</h2>{% endif %}
      </div>
    {% endif %}
    <div class="grid gap-8 md:grid-cols-2 lg:grid-cols-4">
      {% for stat in value.stats %}
        {% include_block stat %}
      {% endfor %}
    </div>
  </div>
</section>

{% load wagtailcore_tags %}

<section class="py-20 px-6 md:px-8 lg:px-12 {% if value.background == 'surface' %}bg-zinc-50{% elif value.background == 'secondary' %}bg-zinc-100{% else %}bg-white{% endif %}">
  <div class="mx-auto max-w-6xl">
    <div class="text-center">
      {% if value.badge %}
        <span class="mb-4 inline-block rounded-full px-4 py-1.5 text-xs font-semibold uppercase tracking-wider bg-orange-50 text-orange-600">{{ value.badge }}</span>
      {% endif %}
      <h2 class="text-3xl text-zinc-900 md:text-4xl">{{ value.headline }}</h2>
      {% if value.description %}
        <p class="mx-auto mt-4 max-w-2xl text-lg text-zinc-600">{{ value.description }}</p>
      {% endif %}
    </div>
    <div class="mt-16 grid gap-8 {% if value.columns == '2' %}md:grid-cols-2{% elif value.columns == '4' %}md:grid-cols-2 lg:grid-cols-4{% else %}md:grid-cols-2 lg:grid-cols-3{% endif %}">
      {% for feature in value.features %}
        {% include_block feature %}
      {% endfor %}
    </div>
  </div>
</section>
